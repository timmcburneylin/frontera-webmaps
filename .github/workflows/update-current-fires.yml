name: Update current fire perimeters

on:
  schedule:
    # Refresh every three hours, offset from the busy start of the hour.
    - cron: "17 */3 * * *"
      timezone: "America/Vancouver"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-current-fires:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Fetch current fire perimeters
        run: |
          set -e
          max_attempts=4
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Fetch attempt $attempt/$max_attempts"
            if python scripts/fetch_current_fire_perimeters.py; then
              echo "Fetch succeeded"
              exit 0
            fi

            echo "Fetch failed on attempt $attempt"
            attempt=$((attempt + 1))
            sleep_seconds=$((attempt * 15))
            echo "Sleeping $sleep_seconds seconds before retry"
            sleep "$sleep_seconds"
          done

          echo "All $max_attempts fetch attempts failed"
          exit 1

      - name: Commit updated fire data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/current-fire-perimeters.geojson data/current-fire-incidents.geojson
          git diff --cached --quiet || git commit -m "Update current fire perimeters"
          git push

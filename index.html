<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Provincial Wildfire Prediction Mapping</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css?v=20260722-copy-legend-1" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-panel" aria-label="Interactive wildfire risk map">
        <div class="map-search-panel">
          <div class="search-panel">
            <label for="community-search">Community</label>
            <div class="search-row">
              <select id="community-search">
                <option value="">Select a community</option>
              </select>
              <button id="clear-search" type="button" aria-label="Clear selected community">Clear</button>
            </div>
          </div>

          <div class="fire-panel">
            <label for="fire-select">Search for Active Wildfires</label>
            <div class="fire-row">
              <select id="fire-select">
                <option value="">Select an active wildfire</option>
              </select>
              <button id="clear-fire" type="button" aria-label="Clear selected wildfire">Clear</button>
            </div>
          </div>
        </div>

        <div id="map" aria-label="BC community wildfire risk map"></div>
      </section>

      <aside class="sidebar">
        <div id="community-sidebar" class="sidebar-content" aria-live="polite">
          <div class="sidebar-empty">
            <h1>Provincial Wildfire Prediction Mapping</h1>
            <p>
              Compare burn probability across BC's 100 most populated Wildland Urban Interface (WUI)
              communities. WUI communities are places where people and wildland vegetation meet, while
              burn probability shows how likely an area could experience wildfire.
            </p>
          </div>
        </div>
        <div class="sidebar-brand">
          <img
            src="assets/frontera-logo.jpeg"
            alt="Frontera Forest Solutions Inc."
            width="720"
            height="720"
          />
        </div>
      </aside>
    </main>

    <div id="graph-modal" class="graph-modal" aria-hidden="true">
      <div class="graph-modal-backdrop" data-close-modal></div>
      <section class="graph-modal-panel" role="dialog" aria-modal="true" aria-labelledby="graph-modal-title">
        <button class="graph-modal-close" type="button" aria-label="Close graph" data-close-modal>Close</button>
        <div id="graph-modal-content"></div>
      </section>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/map.js?v=20260722-copy-legend-1"></script>
  </body>
</html>
